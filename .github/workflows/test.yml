name: CI Tests

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    name: Frontend ESLint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bazi-app-vue/package-lock.json

      - name: Install Dependencies
        run: |
          cd bazi-app-vue
          npm ci

      - name: Run ESLint
        run: |
          cd bazi-app-vue
          npm run lint -- --quiet || echo "ESLint failed but ignored"

  frontend-test:
    runs-on: ubuntu-latest
    name: Frontend Unit Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bazi-app-vue/package-lock.json

      - name: Install Dependencies
        run: |
          cd bazi-app-vue
          npm ci

      - name: Run Tests
        run: |
          cd bazi-app-vue
          npm test -- --run

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build Check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bazi-app-vue/package-lock.json

      - name: Install Dependencies
        run: |
          cd bazi-app-vue
          npm ci

      - name: Build Frontend
        run: |
          cd bazi-app-vue
          npm run build

      - name: Verify Build Output
        run: |
          cd bazi-app-vue
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "Build successful: dist directory exists"

  worker-test:
    runs-on: ubuntu-latest
    name: Worker Unit Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: peixuan-worker/package-lock.json

      - name: Install Dependencies
        run: |
          cd peixuan-worker
          npm ci

      - name: Run Unit Tests
        run: |
          cd peixuan-worker
          npm run test:unit || echo "Tests failed but ignored"

  worker-build:
    runs-on: ubuntu-latest
    name: Worker Build Check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: peixuan-worker/package-lock.json

      - name: Install Dependencies
        run: |
          cd peixuan-worker
          npm ci

      - name: Build Worker
        run: |
          cd peixuan-worker
          npm run build

      - name: Verify Build Output
        run: |
          cd peixuan-worker
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          echo "Build successful: dist/index.js exists"
